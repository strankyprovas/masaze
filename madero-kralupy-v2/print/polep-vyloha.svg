    <symbol id="icon-relax" viewBox="0 0 60 60" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M 30 50 Q 18 46 12 30 Q 22 32 30 42"/>
        <path d="M 30 50 Q 42 46 48 30 Q 38 32 30 42"/>
        <path d="M 30 50 Q 16 42 8 22 Q 22 26 30 42"/>
        <path d="M 30 50 Q 44 42 52 22 Q 38 26 30 42"/>
        <path d="M 30 50 Q 28 32 30 14"/>
      </g>
    </symbol>
  </defs>

