  <g id="center-col" transform="translate(290 0)">
    <!-- corner leaves -->
    <use href="#leaf-branch" x="20" y="60" width="100" height="180" transform="rotate(-15 70 150)" opacity="0.4"/>
    <use href="#leaf-branch" x="748" y="60" width="100" height="180" transform="scale(-1 1) translate(-848 0) rotate(-15 70 150)" opacity="0.4"/>
    <use href="#leaf-branch" x="20" y="600" width="100" height="180" transform="scale(1 -1) translate(0 -1380) rotate(15 70 150)" opacity="0.35"/>
    <use href="#leaf-branch" x="748" y="600" width="100" height="180" transform="scale(-1 -1) translate(-848 -1380) rotate(15 70 150)" opacity="0.35"/>

    <!-- big circular logo -->
    <g transform="translate(434 380)">
      <!-- outer circle -->
      <circle cx="0" cy="0" r="300" fill="none" stroke="#8B6F47" stroke-width="1.8"/>
      <!-- inner thin circle for elegance -->
      <circle cx="0" cy="0" r="288" fill="none" stroke="#8B6F47" stroke-width="0.5" opacity="0.5"/>

      <!-- top arc text -->
      <defs>
        <path id="topArc" d="M -210 -150 A 260 260 0 0 1 210 -150" fill="none"/>
        <path id="bottomArc" d="M -250 80 A 260 260 0 0 0 250 80" fill="none"/>
      </defs>
      <text class="sans-medium" font-size="14" fill="#8B6F47" letter-spacing="0.42em">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">
