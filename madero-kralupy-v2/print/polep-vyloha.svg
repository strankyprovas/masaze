<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086" width="1448" height="1086" preserveAspectRatio="xMidYMid meet">
  <title>Madero Kralupy — Polep výlohy</title>
  <desc>Návrh polepu na výlohu. Vektor — připraveno pro tisk libovolné velikosti. Před tiskem doporučujeme v Inkscape/Illustratoru převést text na cesty (Path → Object to Path), případně exportovat do PDF s embedded fonts.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&amp;family=Dancing+Script:wght@400;500;600&amp;family=Inter:wght@300;400;500;600&amp;display=swap');
      .display { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-weight: 400; }
      .display-bold { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-weight: 600; letter-spacing: 0.06em; }
      .display-light { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-weight: 300; letter-spacing: 0.18em; }
      .script { font-family: 'Dancing Script', cursive; font-weight: 500; }
      .sans { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; }
      .sans-medium { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; }
      .sans-light { font-family: 'Inter', system-ui, sans-serif; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; }
    </style>

    <!-- decorative leaf branch -->
    <symbol id="leaf-branch" viewBox="0 0 100 200" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.3" fill="none" stroke-linecap="round">
        <path d="M 50 0 Q 48 50 50 100 Q 52 150 50 200"/>
        <path d="M 50 18 Q 32 16 22 28 Q 32 34 50 28"/>
        <path d="M 50 28 Q 68 26 78 38 Q 68 44 50 38"/>
        <path d="M 50 50 Q 30 48 18 60 Q 30 68 50 60"/>
        <path d="M 50 62 Q 70 60 82 72 Q 70 78 50 72"/>
        <path d="M 50 86 Q 32 84 22 96 Q 32 104 50 96"/>
        <path d="M 50 100 Q 68 98 80 110 Q 68 118 50 110"/>
        <path d="M 50 122 Q 28 120 16 132 Q 28 140 50 132"/>
        <path d="M 50 136 Q 72 134 84 146 Q 72 154 50 146"/>
        <path d="M 50 160 Q 32 158 22 170 Q 32 178 50 170"/>
        <path d="M 50 174 Q 70 172 80 184 Q 70 190 50 184"/>
      </g>
    </symbol>

    <!-- lotus -->
    <symbol id="lotus" viewBox="0 0 80 50" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.4" fill="none" stroke-linecap="round">
        <path d="M 40 45 Q 25 40 20 25 Q 30 28 40 38"/>
        <path d="M 40 45 Q 55 40 60 25 Q 50 28 40 38"/>
        <path d="M 40 45 Q 18 38 8 18 Q 22 22 38 38"/>
        <path d="M 40 45 Q 62 38 72 18 Q 58 22 42 38"/>
        <path d="M 40 45 Q 38 30 40 12 Q 42 30 40 45"/>
        <line x1="6" y1="46" x2="74" y2="46"/>
      </g>
    </symbol>

    <!-- madero rollers icon (two crossed wooden rollers) -->
    <symbol id="icon-madero" viewBox="0 0 60 60" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="14" y1="44" x2="46" y2="14"/>
        <ellipse cx="20" cy="40" rx="9" ry="5" transform="rotate(-43 20 40)"/>
        <ellipse cx="40" cy="20" rx="9" ry="5" transform="rotate(-43 40 20)"/>
        <line x1="20" y1="40" x2="20" y2="40" stroke-width="3"/>
      </g>
    </symbol>

    <!-- head spa: head with steam -->
    <symbol id="icon-headspa" viewBox="0 0 60 60" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.6" fill="none" stroke-linecap="round">
        <ellipse cx="30" cy="36" rx="14" ry="14"/>
        <path d="M 16 30 Q 14 18 26 16 Q 26 22 28 26"/>
        <path d="M 44 30 Q 46 18 34 16 Q 34 22 32 26"/>
        <path d="M 22 14 Q 24 8 22 4" stroke-dasharray="2 2"/>
        <path d="M 30 12 Q 32 6 30 2" stroke-dasharray="2 2"/>
        <path d="M 38 14 Q 40 8 38 4" stroke-dasharray="2 2"/>
      </g>
    </symbol>

    <!-- lymf: drops -->
    <symbol id="icon-lymf" viewBox="0 0 60 60" overflow="visible">
      <g stroke="#8B6F47" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 22 10 Q 16 26 16 36 Q 16 46 22 50 Q 28 46 28 36 Q 28 26 22 10 Z"/>
        <path d="M 40 18 Q 35 30 35 38 Q 35 46 40 48 Q 45 46 45 38 Q 45 30 40 18 Z"/>
      </g>
    </symbol>

